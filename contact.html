<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - CivicBridge</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<nav class="bg-pink-700">
<div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">

<h1 class="text-2xl font-bold text-white">CivicBridge</h1>

<div class="space-x-8 font-bold text-white text-xl">
<a href="index.html" class="hover:text-gray-200">Home</a>
<a href="services.html" class="hover:text-gray-200">Services</a>
<a href="about.html" class="hover:text-gray-200">About</a>
<a href="contact.html" class="hover:text-gray-200">Contact</a>
</div>

</div>
</nav>

<section class="max-w-xl mx-auto py-16 px-6">

<h2 class="text-3xl font-bold text-center mb-10 text-pink-500">Contact Us</h2>

<form id="contactForm" class="space-y-4 bg-white p-8 rounded-lg shadow">

<input
type="text"
placeholder="Your Name"
class="w-full border p-3 rounded"
required
>

<input
type="email"
placeholder="Your Email"
class="w-full border p-3 rounded"
required
>

<textarea
placeholder="Your Message"
class="w-full border p-3 rounded"
required
></textarea>

<button
class="w-full bg-pink-600 text-white py-3 rounded-lg hover:bg-green-700 font-semibold"
>
Send Message
</button>

</form>

</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
e.preventDefault();
alert("Thank you! Your message has been sent.");
});
</script>

</body>
</html>
